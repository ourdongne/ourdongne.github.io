<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>회원 페이지 디자인 시안 (틀 깨기) — 비교</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, system-ui, sans-serif; background: #2A2F36; color: #E8EBEF; -webkit-font-smoothing: antialiased; }
        .pagebar { background: #1B1F24; padding: 18px 24px; text-align: center; border-bottom: 1px solid #353B43; position: sticky; top: 0; z-index: 10; }
        .pagebar h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
        .pagebar p { font-size: 13px; color: #98A1AC; margin-top: 4px; }
        .nav { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
        .nav a { font-size: 13px; font-weight: 600; color: #cfd5dc; text-decoration: none; background: #2A2F36; border: 1px solid #3C434C; padding: 7px 16px; border-radius: 999px; transition: all .15s; }
        .nav a:hover { background: #FF6B00; border-color: #FF6B00; color: #fff; }
        .block { max-width: 900px; margin: 0 auto; padding: 36px 20px 12px; }
        .label { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .label .tag { font-size: 20px; font-weight: 800; color: #fff; background: #FF6B00; width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .label .tag.e { background: #C98A3A; } .label .tag.f { background: #111; border:1px solid #FF6B00; color:#FF6B00; }
        .label .t-name { font-size: 19px; font-weight: 800; letter-spacing: -0.4px; }
        .label .t-desc { font-size: 14px; color: #98A1AC; }
        .label .open { margin-left: auto; font-size: 13px; font-weight: 600; color: #FF8C3A; text-decoration: none; }
        .label .open:hover { text-decoration: underline; }
        .frame-shell { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.4); border: 1px solid #3C434C; }
        iframe { width: 100%; border: 0; display: block; }
        .endpad { height: 60px; }
    </style>
</head>
<body>
    <div class="pagebar">
        <h1>회원 페이지 디자인 시안 — 틀 깨기 3종</h1>
        <p>아래로 스크롤하며 D / E / F 비교하세요. 샘플 회원 정보가 채워진 실제 화면입니다.</p>
        <div class="nav">
            <a href="#d">D 에디토리얼</a>
            <a href="#e">E 에어리 카드</a>
            <a href="#f">F 다크 프리미엄</a>
        </div>
    </div>

    <div class="block" id="d">
        <div class="label">
            <div class="tag">D</div>
            <div>
                <div class="t-name">에디토리얼</div>
                <div class="t-desc">박스 없애고 큰 제목 + 자료를 번호 리스트로. 매거진 느낌</div>
            </div>
            <a class="open" href="design-d.html?name=김우재&date=2026-06-08&cash=18000&income=7700&saving=2400&target=60000" target="_blank">새 탭에서 크게 보기 ↗</a>
        </div>
        <div class="frame-shell"><iframe data-src="design-d.html?name=김우재&date=2026-06-08&cash=18000&income=7700&saving=2400&target=60000"></iframe></div>
    </div>

    <div class="block" id="e">
        <div class="label">
            <div class="tag e">E</div>
            <div>
                <div class="t-name">에어리 카드</div>
                <div class="t-desc">베이지 배경 + 큼직한 플랫 카드 + 라인 아이콘. 모던 서비스</div>
            </div>
            <a class="open" href="design-e.html?name=김우재&date=2026-06-08&cash=18000&income=7700&saving=2400&target=60000" target="_blank">새 탭에서 크게 보기 ↗</a>
        </div>
        <div class="frame-shell"><iframe data-src="design-e.html?name=김우재&date=2026-06-08&cash=18000&income=7700&saving=2400&target=60000"></iframe></div>
    </div>

    <div class="block" id="f">
        <div class="label">
            <div class="tag f">F</div>
            <div>
                <div class="t-name">다크 프리미엄</div>
                <div class="t-desc">전체 검정 + 주황. 고급 앱 느낌 (제일 과감)</div>
            </div>
            <a class="open" href="design-f.html?name=김우재&date=2026-06-08&cash=18000&income=7700&saving=2400&target=60000" target="_blank">새 탭에서 크게 보기 ↗</a>
        </div>
        <div class="frame-shell"><iframe data-src="design-f.html?name=김우재&date=2026-06-08&cash=18000&income=7700&saving=2400&target=60000"></iframe></div>
    </div>

    <div class="endpad"></div>

    <script>
        function fitFrame(f) {
            try {
                var h = f.contentWindow.document.documentElement.scrollHeight;
                if (h > 0) f.style.height = h + 'px';
            } catch (e) { f.style.height = '1500px'; }
        }
        document.querySelectorAll('iframe').forEach(function(f) {
            f.addEventListener('load', function() { fitFrame(f); setTimeout(function(){ fitFrame(f); }, 400); });
            f.src = f.getAttribute('data-src');
        });
        window.addEventListener('resize', function() { document.querySelectorAll('iframe').forEach(fitFrame); });
    </script>
</body>
</html>
